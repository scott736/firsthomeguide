<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Module 4: Government Programs - Maple leaf with document/shield -->
  <g stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Maple leaf (simplified) -->
    <path d="M70,25 L75,45 L60,42 L65,55 L48,52 L70,80 L92,52 L75,55 L80,42 L65,45 Z" fill="#fff" opacity="0.25" stroke-width="1.5"/>
    <line x1="70" y1="80" x2="70" y2="95" stroke-width="2"/>
    <!-- Document/certificate -->
    <rect x="110" y="20" width="65" height="85" rx="5" opacity="0.9"/>
    <!-- Lines on document -->
    <line x1="122" y1="38" x2="163" y2="38" opacity="0.4"/>
    <line x1="122" y1="48" x2="158" y2="48" opacity="0.4"/>
    <line x1="122" y1="58" x2="160" y2="58" opacity="0.4"/>
    <line x1="122" y1="68" x2="150" y2="68" opacity="0.4"/>
    <!-- Stamp/seal -->
    <circle cx="152" cy="85" r="12" opacity="0.6"/>
    <polyline points="146,85 150,90 158,80" stroke-width="2.5" opacity="0.8"/>
    <!-- Dollar signs floating -->
    <text x="30" y="45" font-family="Arial" font-size="14" fill="#fff" opacity="0.3">$</text>
    <text x="20" y="75" font-family="Arial" font-size="12" fill="#fff" opacity="0.2">$</text>
    <text x="42" y="105" font-family="Arial" font-size="16" fill="#fff" opacity="0.25">$</text>
  </g>
</svg>