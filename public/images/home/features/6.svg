<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Module 6: Making an Offer - Handshake with document -->
  <g stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Document behind -->
    <rect x="55" y="12" width="90" height="55" rx="5" opacity="0.3" fill="#fff"/>
    <line x1="70" y1="25" x2="130" y2="25" opacity="0.2"/>
    <line x1="70" y1="33" x2="125" y2="33" opacity="0.2"/>
    <line x1="70" y1="41" x2="128" y2="41" opacity="0.2"/>
    <line x1="70" y1="49" x2="110" y2="49" opacity="0.2"/>
    <!-- Signature line -->
    <line x1="95" y1="55" x2="135" y2="55" opacity="0.3"/>
    <path d="M100,53 C103,48 108,56 112,50 C114,47 118,54 120,52" stroke-width="1.5" opacity="0.4"/>
    <!-- Handshake -->
    <g transform="translate(45, 60)">
      <!-- Left hand -->
      <path d="M10,35 L25,25 L45,20 L55,25" stroke-width="2.5" opacity="0.9"/>
      <path d="M10,35 C5,38 0,35 0,30 L0,20 L15,15" stroke-width="2" opacity="0.7"/>
      <!-- Right hand -->
      <path d="M100,35 L85,25 L65,20 L55,25" stroke-width="2.5" opacity="0.9"/>
      <path d="M100,35 C105,38 110,35 110,30 L110,20 L95,15" stroke-width="2" opacity="0.7"/>
      <!-- Grip -->
      <ellipse cx="55" cy="23" rx="15" ry="8" fill="#fff" opacity="0.15"/>
    </g>
    <!-- Dollar tag -->
    <g opacity="0.5" transform="translate(155,20)">
      <rect x="0" y="0" width="30" height="20" rx="3"/>
      <text x="7" y="15" font-family="Arial" font-size="14" fill="#fff" opacity="0.7">$</text>
    </g>
  </g>
</svg>