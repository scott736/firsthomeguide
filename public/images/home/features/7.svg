<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Module 7: Closing the Deal - Key with house keychain -->
  <g stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Large key -->
    <circle cx="65" cy="50" r="25" stroke-width="2.5" opacity="0.9"/>
    <circle cx="65" cy="50" r="15" opacity="0.3"/>
    <line x1="90" y1="50" x2="160" y2="50" stroke-width="3" opacity="0.9"/>
    <!-- Key teeth -->
    <line x1="145" y1="50" x2="145" y2="62" stroke-width="2.5"/>
    <line x1="155" y1="50" x2="155" y2="58" stroke-width="2.5"/>
    <line x1="160" y1="50" x2="160" y2="65" stroke-width="2.5"/>
    <!-- Small house keychain -->
    <g transform="translate(50, 78)" opacity="0.7">
      <line x1="15" y1="0" x2="15" y2="-5"/>
      <polygon points="5,15 15,5 25,15"/>
      <rect x="8" y="15" width="14" height="12"/>
      <rect x="12" y="19" width="6" height="8" rx="1"/>
    </g>
    <!-- Sparkle/celebration accents -->
    <g opacity="0.4">
      <line x1="120" y1="20" x2="120" y2="28"/>
      <line x1="116" y1="24" x2="124" y2="24"/>
      <line x1="170" y1="30" x2="170" y2="36"/>
      <line x1="167" y1="33" x2="173" y2="33"/>
      <line x1="150" y1="75" x2="150" y2="81"/>
      <line x1="147" y1="78" x2="153" y2="78"/>
    </g>
    <!-- Checkmark circle -->
    <circle cx="170" cy="95" r="16" opacity="0.5"/>
    <polyline points="162,95 168,101 178,89" stroke-width="2.5" opacity="0.6"/>
  </g>
</svg>