<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Module 5: Finding a Home - Magnifying glass over houses -->
  <g stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Row of small houses -->
    <g opacity="0.4">
      <!-- House 1 -->
      <polygon points="25,90 40,75 55,90"/>
      <rect x="30" y="90" width="20" height="18"/>
      <!-- House 2 -->
      <polygon points="65,90 80,75 95,90"/>
      <rect x="70" y="90" width="20" height="18"/>
      <!-- House 3 -->
      <polygon points="105,90 120,75 135,90"/>
      <rect x="110" y="90" width="20" height="18"/>
    </g>
    <!-- Featured house (inside magnifying glass area) -->
    <g opacity="0.9">
      <polygon points="85,55 105,35 125,55"/>
      <rect x="90" y="55" width="30" height="25"/>
      <rect x="100" y="62" width="10" height="18" rx="1"/>
      <rect x="92" y="58" width="8" height="7" rx="1"/>
      <circle cx="108" cy="72" r="1.5" fill="#fff"/>
    </g>
    <!-- Magnifying glass -->
    <circle cx="105" cy="52" r="35" stroke-width="2.5" opacity="0.7"/>
    <line x1="130" y1="77" x2="155" y2="105" stroke-width="4" opacity="0.7"/>
    <!-- Location pin -->
    <g opacity="0.5" transform="translate(160, 25)">
      <path d="M10,0 C15,0 20,5 20,11 C20,18 10,28 10,28 C10,28 0,18 0,11 C0,5 5,0 10,0 Z"/>
      <circle cx="10" cy="11" r="4" fill="#fff" opacity="0.4"/>
    </g>
  </g>
</svg>