<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" fill="none">
  <!-- Module 2: Saving Smart - Piggy bank with coins and growth -->
  <g stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Piggy bank body -->
    <ellipse cx="95" cy="82" rx="45" ry="35" opacity="0.9"/>
    <!-- Ear -->
    <ellipse cx="68" cy="56" rx="10" ry="12" opacity="0.7"/>
    <!-- Snout -->
    <ellipse cx="140" cy="85" rx="12" ry="9"/>
    <circle cx="137" cy="83" r="2" fill="#fff"/>
    <circle cx="143" cy="83" r="2" fill="#fff"/>
    <!-- Eye -->
    <circle cx="112" cy="72" r="3" fill="#fff"/>
    <!-- Legs -->
    <line x1="70" y1="110" x2="70" y2="122"/>
    <line x1="85" y1="112" x2="85" y2="122"/>
    <line x1="105" y1="112" x2="105" y2="122"/>
    <line x1="120" y1="110" x2="120" y2="122"/>
    <!-- Coin slot -->
    <line x1="88" y1="48" x2="102" y2="48" stroke-width="3"/>
    <!-- Coins floating in -->
    <circle cx="80" cy="28" r="8" opacity="0.5"/>
    <text x="76" y="32" font-family="Arial" font-size="11" fill="#fff" opacity="0.5">$</text>
    <circle cx="105" cy="20" r="8" opacity="0.7"/>
    <text x="101" y="24" font-family="Arial" font-size="11" fill="#fff" opacity="0.7">$</text>
    <!-- Growth arrow -->
    <polyline points="155,110 155,45 170,45" stroke-width="2" opacity="0.5"/>
    <polyline points="155,70 163,55 170,65 178,38" stroke-width="2" opacity="0.4"/>
    <polyline points="173,38 178,38 178,43" stroke-width="2" opacity="0.4"/>
  </g>
</svg>