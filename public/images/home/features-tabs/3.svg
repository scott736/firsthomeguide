<svg xmlns="http://www.w3.org/2000/svg" width="550" height="544" viewBox="0 0 550 544" fill="none">
  <g stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Winding path background -->
    <path d="M100 480 Q100 440 160 420 Q240 395 280 360 Q320 325 260 290 Q200 255 240 220 Q280 185 340 195 Q400 205 420 170 Q440 135 400 105 Q360 75 400 55" stroke-width="3" opacity="0.1" fill="none"/>
    <!-- Winding path dashed -->
    <path d="M100 480 Q100 440 160 420 Q240 395 280 360 Q320 325 260 290 Q200 255 240 220 Q280 185 340 195 Q400 205 420 170 Q440 135 400 105 Q360 75 400 55" stroke-width="2" opacity="0.25" fill="none" stroke-dasharray="8 6"/>

    <!-- Module 1 -->
    <circle cx="100" cy="480" r="20" fill="#fff" fill-opacity="0.08" stroke="none"/>
    <circle cx="100" cy="480" r="12" fill="#fff" fill-opacity="0.15" stroke="none"/>
    <text x="100" y="485" font-family="system-ui, sans-serif" font-size="13" fill="#fff" fill-opacity="0.8" text-anchor="middle" font-weight="700" stroke="none">1</text>
    <text x="130" y="498" font-family="system-ui, sans-serif" font-size="11" fill="#fff" fill-opacity="0.4" stroke="none">Ready?</text>

    <!-- Module 2 -->
    <circle cx="200" cy="408" r="12" fill="#fff" fill-opacity="0.12" stroke="none"/>
    <text x="200" y="413" font-family="system-ui, sans-serif" font-size="12" fill="#fff" fill-opacity="0.7" text-anchor="middle" font-weight="600" stroke="none">2</text>
    <text x="222" y="420" font-family="system-ui, sans-serif" font-size="11" fill="#fff" fill-opacity="0.35" stroke="none">Saving</text>

    <!-- Module 3 -->
    <circle cx="290" cy="350" r="12" fill="#fff" fill-opacity="0.12" stroke="none"/>
    <text x="290" y="355" font-family="system-ui, sans-serif" font-size="12" fill="#fff" fill-opacity="0.7" text-anchor="middle" font-weight="600" stroke="none">3</text>
    <text x="312" y="358" font-family="system-ui, sans-serif" font-size="11" fill="#fff" fill-opacity="0.35" stroke="none">Mortgage</text>

    <!-- Module 4 -->
    <circle cx="252" cy="285" r="12" fill="#fff" fill-opacity="0.12" stroke="none"/>
    <text x="252" y="290" font-family="system-ui, sans-serif" font-size="12" fill="#fff" fill-opacity="0.7" text-anchor="middle" font-weight="600" stroke="none">4</text>
    <text x="274" y="293" font-family="system-ui, sans-serif" font-size="11" fill="#fff" fill-opacity="0.35" stroke="none">Programs</text>

    <!-- Module 5 - highlighted -->
    <circle cx="265" cy="228" r="24" fill="#fff" fill-opacity="0.06" stroke="none"/>
    <circle cx="265" cy="228" r="16" fill="#fff" fill-opacity="0.12" stroke="none"/>
    <circle cx="265" cy="228" r="10" fill="#fff" fill-opacity="0.3" stroke="none"/>
    <text x="265" y="233" font-family="system-ui, sans-serif" font-size="12" fill="#fff" fill-opacity="0.9" text-anchor="middle" font-weight="700" stroke="none">5</text>
    <rect x="155" y="213" width="90" height="30" rx="8" fill="#fff" fill-opacity="0.08" stroke-width="1" opacity="0.15"/>
    <text x="200" y="233" font-family="system-ui, sans-serif" font-size="11" fill="#fff" fill-opacity="0.6" text-anchor="middle" stroke="none">Finding</text>

    <!-- Module 6 -->
    <circle cx="370" cy="198" r="12" fill="#fff" fill-opacity="0.12" stroke="none"/>
    <text x="370" y="203" font-family="system-ui, sans-serif" font-size="12" fill="#fff" fill-opacity="0.7" text-anchor="middle" font-weight="600" stroke="none">6</text>
    <text x="392" y="206" font-family="system-ui, sans-serif" font-size="11" fill="#fff" fill-opacity="0.35" stroke="none">Offer</text>

    <!-- Module 7 -->
    <circle cx="425" cy="150" r="12" fill="#fff" fill-opacity="0.12" stroke="none"/>
    <text x="425" y="155" font-family="system-ui, sans-serif" font-size="12" fill="#fff" fill-opacity="0.7" text-anchor="middle" font-weight="600" stroke="none">7</text>
    <text x="447" y="158" font-family="system-ui, sans-serif" font-size="11" fill="#fff" fill-opacity="0.35" stroke="none">Closing</text>

    <!-- Module 8 - end -->
    <circle cx="400" cy="55" r="20" fill="#fff" fill-opacity="0.08" stroke="none"/>
    <circle cx="400" cy="55" r="12" fill="#fff" fill-opacity="0.2" stroke="none"/>
    <text x="400" y="60" font-family="system-ui, sans-serif" font-size="13" fill="#fff" fill-opacity="0.9" text-anchor="middle" font-weight="700" stroke="none">8</text>
    <path d="M428 48 L440 38 L452 48 L452 60 L428 60 Z" stroke-width="1.5" opacity="0.4" fill="#fff" fill-opacity="0.05"/>
    <text x="440" y="76" font-family="system-ui, sans-serif" font-size="11" fill="#fff" fill-opacity="0.5" stroke="none">Home!</text>

    <!-- Progress bar -->
    <rect x="80" y="510" width="200" height="6" rx="3" fill="#fff" fill-opacity="0.06" stroke="none"/>
    <rect x="80" y="510" width="125" height="6" rx="3" fill="#fff" fill-opacity="0.2" stroke="none"/>
    <text x="80" y="535" font-family="system-ui, sans-serif" font-size="11" fill="#fff" fill-opacity="0.35" stroke="none">Module 5 of 8</text>
  </g>
</svg>
